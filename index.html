<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fighter Jets</title>
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f0f0f0; }
header { background:#222; color:#fff; padding:15px; text-align:center; font-size:1.5em; }
input { width: 90%; margin:10px 5%; padding:8px; font-size:1em; }
.jet-card { background:#fff; margin:10px 5%; padding:10px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.2); }
.jet-card h2 { margin:0 0 5px 0; }
.jet-card p { margin:2px 0; font-size:0.9em; }
</style>
</head>
<body>
<header>Fighter Jets</header>
<input type="text" id="search" placeholder="Search jets by name, country, type...">

<div id="jet-list"></div>

<script>
const url = "YOUR_RAW_GITHUB_JSON_URL"; // Replace with your GitHub raw URL
let jets = [];

async function loadJets() {
  const res = await fetch(url);
  jets = await res.json();
  displayJets(jets);
}

function displayJets(list) {
  const container = document.getElementById("jet-list");
  container.innerHTML = "";
  list.forEach(jet => {
    const card = document.createElement("div");
    card.className = "jet-card";
    card.innerHTML = `
      <h2>${jet.name}</h2>
      <p><strong>Country:</strong> ${jet.country}</p>
      <p><strong>Type:</strong> ${jet.type}</p>
      <p><strong>Status:</strong> ${jet.status}</p>
      <p><strong>First Flight:</strong> ${jet.first_flight}</p>
      <p><strong>Weapons:</strong> ${jet.weapons.join(", ")}</p>
    `;
    container.appendChild(card);
  });
}

document.getElementById("search").addEventListener("input", (e) => {
  const term = e.target.value.toLowerCase();
  const filtered = jets.filter(j => 
    j.name.toLowerCase().includes(term) || 
    j.country.toLowerCase().includes(term) ||
    j.type.toLowerCase().includes(term)
  );
  displayJets(filtered);
});

loadJets();
</script>
</body>
</html>
